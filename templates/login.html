<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parivahan Service - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0d1117; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-card { background: #161b22; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px 0 rgba(0, 242, 254, 0.1); border: 1px solid #30363d; text-align: center; }
        h2 { font-size: 28px; margin-bottom: 10px; color: #00f2fe; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #8b949e; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; text-transform: uppercase; color: #58a6ff; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 8px; color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #00f2fe; outline: none; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #0072ff, #00f2fe); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); }
        .error { color: #ff7b72; font-size: 14px; margin-top: 15px; background: rgba(255,123,114,0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255,123,114,0.2); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Parivahan</h2>
        <p>Premium Vehicle Intelligence Portal</p>
        <form action="/login" method="POST">
            <div class="input-group">
                <label>यूज़रनेम</label>
                <input type="text" name="username" placeholder="Username दर्ज करें" required>
            </div>
            <div class="input-group">
                <label>पासवर्ड</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">लॉगिन करें</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </div>
</body>
</html>
